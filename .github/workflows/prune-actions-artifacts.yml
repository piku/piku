name: Actions cleanup

on:
  workflow_run:
    workflows:
      - "Close inactive issues"
      - "CodeQL"
      - "Dependabot Updates"
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    name: Prune old Actions artifacts and runs
    if: >-
      github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Delete artifacts and completed runs older than 7 days
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            let artifactCount = 0;
            for (const artifact of artifacts) {
              const created = new Date(artifact.created_at).getTime();
              if (artifact.expired || created < cutoff) {
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id });
                artifactCount++;
              }
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
              status: 'completed',
            });

            let runCount = 0;
            for (const run of runs) {
              if (run.id === context.runId) continue;
              const created = new Date(run.created_at).getTime();
              if (created < cutoff) {
                try {
                  await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                  runCount++;
                } catch (error) {
                  core.warning(`Could not delete workflow run ${run.id}: ${error.message}`);
                }
              }
            }

            core.notice(`Deleted ${artifactCount} artifacts and ${runCount} completed workflow runs older than 7 days.`);
