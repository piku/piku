name: Actions cleanup

on:
  workflow_run:
    workflows:
      - "Basic Test Suite and Linting"
      - "Test Against OS Packages"
      - "UV Integration Tests"
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: actions-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Prune old Actions artifacts, caches, and runs
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-latest
    env:
      KEEP_RUNS: '10'
      KEEP_CACHES: '100'
      RETENTION_DAYS: '7'
    steps:
      - name: Delete stale Actions storage
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepRuns = Math.max(1, Number(process.env.KEEP_RUNS || '10') || 10);
            const keepCaches = Math.max(1, Number(process.env.KEEP_CACHES || '100') || 100);
            const retentionDays = Math.max(1, Number(process.env.RETENTION_DAYS || '7') || 7);
            const cutoff = Date.now() - retentionDays * 24 * 60 * 60 * 1000;

            async function tryDelete(label, fn) {
              for (let attempt = 1; attempt <= 3; attempt++) {
                try {
                  await fn();
                  return true;
                } catch (error) {
                  if (error?.status === 404) return true;
                  const status = Number(error?.status || 0);
                  const rateLimited = status === 403 || status === 429;
                  const retryable = status >= 500;
                  core.warning(`${label} failed on attempt ${attempt}: ${error.message}`);
                  if (rateLimited || !retryable || attempt === 3) return false;
                  await new Promise(resolve => setTimeout(resolve, attempt * 3000));
                }
              }
              return false;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
              status: 'completed',
            });
            runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const keptPerWorkflow = new Map();
            const keepRunIds = new Set();
            for (const run of runs) {
              const workflowId = String(run.workflow_id || run.name || 'unknown');
              const count = keptPerWorkflow.get(workflowId) || 0;
              if (count < keepRuns) {
                keepRunIds.add(String(run.id));
                keptPerWorkflow.set(workflowId, count + 1);
              }
            }

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            artifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const orphanArtifacts = artifacts.filter(artifact => !artifact.workflow_run?.id);
            const keepOrphanArtifactIds = new Set(orphanArtifacts.slice(0, keepRuns).map(artifact => artifact.id));

            let artifactCount = 0;
            let artifactBytes = 0;
            for (const artifact of artifacts) {
              const created = new Date(artifact.created_at).getTime();
              const runId = artifact.workflow_run?.id;
              const outsideRunWindow = runId
                ? !keepRunIds.has(String(runId))
                : !keepOrphanArtifactIds.has(artifact.id);
              if (artifact.expired || created < cutoff || outsideRunWindow) {
                if (await tryDelete(`delete artifact ${artifact.id}`, () => github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id }))) {
                  artifactCount++;
                  artifactBytes += Number(artifact.size_in_bytes || 0);
                }
              }
            }

            const caches = await github.paginate(github.rest.actions.getActionsCacheList, {
              owner,
              repo,
              per_page: 100,
            });
            caches.sort((a, b) => new Date(b.last_accessed_at || b.created_at) - new Date(a.last_accessed_at || a.created_at));
            const keepCacheIds = new Set(caches.slice(0, keepCaches).map(cache => cache.id));

            let cacheCount = 0;
            let cacheBytes = 0;
            for (const cache of caches) {
              const lastUsed = new Date(cache.last_accessed_at || cache.created_at).getTime();
              if (lastUsed < cutoff || !keepCacheIds.has(cache.id)) {
                if (await tryDelete(`delete cache ${cache.id}`, () => github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: cache.id }))) {
                  cacheCount++;
                  cacheBytes += Number(cache.size_in_bytes || 0);
                }
              }
            }

            let runCount = 0;
            for (const run of runs) {
              if (Number(run.id) === Number(context.runId)) continue;
              const created = new Date(run.created_at).getTime();
              if (created < cutoff && await tryDelete(`delete workflow run ${run.id}`, () => github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id }))) {
                runCount++;
              }
            }

            core.notice(`Deleted ${artifactCount} artifact(s) (${(artifactBytes / 1024 / 1024).toFixed(1)} MiB), ${cacheCount} cache(s) (${(cacheBytes / 1024 / 1024).toFixed(1)} MiB), and ${runCount} completed workflow run(s).`);
