name: Prune Actions artifacts

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: prune-actions-artifacts
  cancel-in-progress: false

jobs:
  prune:
    name: Keep artifacts for last 10 runs
    runs-on: ubuntu-latest
    env:
      KEEP_RUNS: '10'
    steps:
      - name: Delete stale artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const keepRuns = Math.max(1, Number(process.env.KEEP_RUNS || '10') || 10);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepRunIds = new Set([Number(context.runId)]);

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100,
            });

            for (const workflow of workflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: Math.min(100, keepRuns),
              });
              for (const run of runs.data.workflow_runs.slice(0, keepRuns)) {
                keepRunIds.add(Number(run.id));
              }
            }

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            let deleted = 0;
            let reclaimed = 0;

            for (const artifact of artifacts) {
              const runId = Number(artifact.workflow_run?.id);
              if (Number.isFinite(runId) && keepRunIds.has(runId)) continue;
              try {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
                deleted += 1;
                reclaimed += Number(artifact.size_in_bytes || 0);
              } catch (error) {
                if (error?.status === 404) continue;
                core.warning(`Failed to delete artifact ${artifact.id} (${artifact.name}): ${error.message}`);
              }
            }

            const mib = (reclaimed / 1024 / 1024).toFixed(1);
            core.notice(`Kept artifacts for the last ${keepRuns} runs per workflow; deleted ${deleted} stale artifact(s), reclaiming approximately ${mib} MiB.`);
