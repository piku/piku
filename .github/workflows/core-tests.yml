name: Basic Test Suite and Linting

on:
  push:
    paths:
      - 'piku.py'
      - 'piku'
      - 'requirements.txt'
      - '.github/workflows/core-tests.yml'
  pull_request:
    paths:
      - 'piku.py'
      - 'piku'
      - 'requirements.txt'
      - '.github/workflows/core-tests.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test CLI
      run: |
        python piku.py --help
        python piku.py setup
    - name: Test config parsing
      run: |
        python -c "
        import piku
        # Test sanitize_app_name
        assert piku.sanitize_app_name('my-app_1.0') == 'my-app_1.0'
        assert piku.sanitize_app_name('/etc/passwd') == 'etcpasswd'
        assert piku.sanitize_app_name('app; rm -rf /') == 'apprm-rf'
        print('sanitize_app_name: OK')

        # Test get_nginx_ssl_config returns a tuple
        ssl, http2 = piku.get_nginx_ssl_config()
        assert '443' in ssl
        assert 'ssl' in ssl
        print('get_nginx_ssl_config: OK')
        "
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # flake8 does not understand escaping dots inside templates for nginx and SSH
        flake8 . --ignore=W605 --count --max-complexity=78 --max-line-length=255 --statistics
